---
name: CI Actions

on: []

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/iwinux/agent-runner
    steps:
      - name: set up Docker image builder
        uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: check out codebase
        uses: actions/checkout@v4

      - name: build Docker image
        uses: docker/build-push-action@v6
        with:
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:base-cache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:base-cache,mode=max
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest # FIXME: use YYYYMMDDHHmmss as tag suffix
