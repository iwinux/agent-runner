---
name: CI Actions

on:
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/iwinux/agent-runner

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.tag.outputs.value }}
    steps:
      - name: generate timestamp tag
        id: tag
        run: echo "value=$(date -u +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"

  build-image:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            tag-suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            tag-suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      actions: read
      contents: read
      packages: write
    steps:
      - name: set up Docker image builder
        uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: check out codebase
        uses: actions/checkout@v4

      - name: hash Pi bundle lockfiles
        id: pi_bundle_hash
        run: |
          echo -n 'value=' >> "$GITHUB_OUTPUT"
          cat packaging/pi-packages.sources.tsv packaging/pi-packages.lock.tsv | sha256sum | cut -d' ' -f1 >> "$GITHUB_OUTPUT"

      - name: look up Pi bundle artifact
        id: pi_bundle_lookup
        env:
          ARTIFACT_NAME: pi-bundle-${{ steps.pi_bundle_hash.outputs.value }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          ARTIFACT_URI="repos/${GITHUB_REPOSITORY}/actions/artifacts?name=${ARTIFACT_NAME}"
          RUN_ID="$(gh api "${ARTIFACT_URI}" --jq '.artifacts[] | select(.expired == false) | .workflow_run.id' | head -n1 || true)"

          if [ -z "${RUN_ID}" ]; then
            echo "hit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "hit=true" >> "$GITHUB_OUTPUT"

      - name: restore Pi bundle artifact
        if: steps.pi_bundle_lookup.outputs.hit == 'true'
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: pi-bundle-${{ steps.pi_bundle_hash.outputs.value }}
          path: pi-bundle
          run-id: ${{ steps.pi_bundle_lookup.outputs.run_id }}

      - name: fetch Pi packages
        if: steps.pi_bundle_lookup.outputs.hit != 'true'
        run: scripts/fetch-pi-packages.sh

      - name: upload Pi bundle artifact
        if: steps.pi_bundle_lookup.outputs.hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pi-bundle-${{ steps.pi_bundle_hash.outputs.value }}
          path: pi-bundle
          if-no-files-found: error
          retention-days: 30

      - name: build Docker image
        uses: docker/build-push-action@v6
        with:
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:cache-${{ matrix.tag-suffix }}
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:cache-${{ matrix.tag-suffix }},mode=max
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest-${{ matrix.tag-suffix }}
            ${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.timestamp }}-${{ matrix.tag-suffix }}

  merge-manifests:
    needs: [prepare, build-image]
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: set up Docker image builder
        uses: docker/setup-buildx-action@v3

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: create and push multi-arch manifests
        env:
          TAG: ${{ needs.prepare.outputs.timestamp }}
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:latest-amd64 \
            ${{ env.IMAGE_NAME }}:latest-arm64

          docker buildx imagetools create -t ${{ env.IMAGE_NAME }}:${TAG} \
            ${{ env.IMAGE_NAME }}:${TAG}-amd64 \
            ${{ env.IMAGE_NAME }}:${TAG}-arm64
